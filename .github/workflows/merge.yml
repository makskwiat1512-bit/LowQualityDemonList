name: Merge List Data

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Render Leaderboard Data
        run: |
          mkdir -p js
          echo "const players = {};" > js/data.js
          echo "export const list = [];" >> js/data.js
          
          if [ -d "scripts" ]; then
            for f in scripts/*.js; do [ -e "$f" ] && node "$f"; done
          fi
          
          if [ -f "index.js" ]; then node index.js; fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Automated leaderboard fallback generation [skip ci]"
            git push origin main
          fi
